name: Keep Supabase Alive

on:
  schedule:
    # 3日に1回 JST 9:00ごろ
    - cron: "0 0 */3 * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/trips?select=id&limit=1" \
          -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
